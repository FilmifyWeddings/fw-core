name: Remote Dispatch Deploy
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Executing remote ssh commands to deploy
      uses: appleboy/ssh-action@master
      with:
        host: "143.244.133.235"
        username: "root"
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /var/www/fw-core
          echo "=== DIAGNOSTICS ==="
          pwd
          git status
          git log -n 3
          pm2 status
          pm2 show fw-core || pm2 show all
          echo "=== END DIAGNOSTICS ==="
          chmod +x deploy.sh
          ./deploy.sh
